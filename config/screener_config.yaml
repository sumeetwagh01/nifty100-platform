# config/screener_config.yaml
# Sprint 3 — Screener filter definitions
#
# Each metric entry:
#   column      : column name in financial_ratios table
#   direction   : min (higher is better) | max (lower is better)
#   default     : default threshold value (None = no default filter)
#   label       : human-readable name
#   unit        : display unit
#   sector_skip : list of broad_sector values to skip for this filter

metrics:

  roe_min:
    column: return_on_equity_pct
    direction: min
    default: null
    label: Return on Equity
    unit: "%"
    sector_skip: []

  de_max:
    column: debt_to_equity
    direction: max
    default: null
    label: Debt to Equity
    unit: "x"
    sector_skip:
      - Financials       # structurally high leverage — skip D/E filter for banks

  fcf_min:
    column: free_cash_flow_cr
    direction: min
    default: null
    label: Free Cash Flow
    unit: "Cr"
    sector_skip: []

  revenue_cagr_5yr_min:
    column: revenue_cagr_5yr
    direction: min
    default: null
    label: Revenue CAGR 5yr
    unit: "%"
    sector_skip: []

  pat_cagr_5yr_min:
    column: pat_cagr_5yr
    direction: min
    default: null
    label: PAT CAGR 5yr
    unit: "%"
    sector_skip: []

  opm_min:
    column: operating_profit_margin_pct
    direction: min
    default: null
    label: Operating Profit Margin
    unit: "%"
    sector_skip: []

  pe_max:
    column: pe_ratio
    direction: max
    default: null
    label: Price to Earnings
    unit: "x"
    sector_skip: []

  pb_max:
    column: pb_ratio
    direction: max
    default: null
    label: Price to Book
    unit: "x"
    sector_skip: []

  dividend_yield_min:
    column: dividend_yield_pct
    direction: min
    default: null
    label: Dividend Yield
    unit: "%"
    sector_skip: []

  icr_min:
    column: interest_coverage
    direction: min
    default: null
    label: Interest Coverage Ratio
    unit: "x"
    sector_skip: []
    debt_free_passes: true   # icr_label = Debt Free → treated as infinity

  market_cap_min:
    column: market_cap_cr
    direction: min
    default: null
    label: Market Cap
    unit: "Cr"
    sector_skip: []

  net_profit_min:
    column: net_profit_margin_pct
    direction: min
    default: null
    label: Net Profit Margin
    unit: "%"
    sector_skip: []

  eps_cagr_5yr_min:
    column: eps_cagr_5yr
    direction: min
    default: null
    label: EPS CAGR 5yr
    unit: "%"
    sector_skip: []

  asset_turnover_min:
    column: asset_turnover
    direction: min
    default: null
    label: Asset Turnover
    unit: "x"
    sector_skip: []

  sales_min:
    column: sales
    direction: min
    default: null
    label: Sales
    unit: "Cr"
    sector_skip: []
